<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보고서 상세 — 방산 리서치 아카이브</title>
  <style>
    *,
    *::before,
    *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --text-primary: #1a2332;
      --text-secondary: #5c6574;
      --text-muted: #8b939e;
      --border: #e2e5ea;
      --accent: #3d5a73;
      --accent-light: #eef2f6;
    }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      color: var(--accent);
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-header {
      padding: 1rem 1.25rem;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
    }

    .section-header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .report-card { padding: 1.5rem; }

    .detail-title {
      font-size: 1.375rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.75rem;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .detail-topic { color: var(--accent); font-weight: 500; }

    .report-block { margin-bottom: 1.25rem; }
    .report-block:last-child { margin-bottom: 0; }

    .report-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .report-text {
      font-size: 0.9375rem;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .report-summary { color: var(--text-secondary); }
    .report-sources { color: var(--text-secondary); font-size: 0.875rem; }

    .report-error {
      padding: 1.5rem;
      color: #b54747;
      font-size: 0.9375rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 목록으로</a>

    <section>
      <div class="section-header">
        <h1>보고서 상세</h1>
      </div>

      <article id="report-detail" class="report-card" hidden>
        <h2 id="detail-title" class="detail-title"></h2>
        <p class="detail-meta">
          <span id="detail-topic" class="detail-topic"></span>
          <span id="detail-date"></span>
        </p>

        <div class="report-block">
          <div class="report-label">요약</div>
          <div id="detail-summary" class="report-text report-summary"></div>
        </div>
        <div class="report-block">
          <div class="report-label">본문</div>
          <div id="detail-content" class="report-text"></div>
        </div>
        <div class="report-block">
          <div class="report-label">출처</div>
          <div id="detail-sources" class="report-text report-sources"></div>
        </div>
      </article>

      <div id="report-error" class="report-error" hidden>불러오는 중…</div>
    </section>
  </div>
  <script src="js/report-detail.js"></script>
</body>
</html>
