<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방산 리서치 아카이브</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --text-primary: #1a2332;
      --text-secondary: #5c6574;
      --text-muted: #8b939e;
      --border: #e2e5ea;
      --accent: #3d5a73;
      --accent-light: #eef2f6;
    }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.9375rem;
      color: var(--text-secondary);
    }

    .research-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }

    .research-form input {
      flex: 1;
      min-width: 0;
      padding: 0.625rem 0.875rem;
      font-size: 0.9375rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-primary);
    }

    .research-form input:focus {
      outline: 2px solid var(--accent-light);
      border-color: var(--accent);
    }

    .research-form button {
      flex-shrink: 0;
      padding: 0.625rem 1.125rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .research-form button:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .research-form button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .research-status {
      margin-top: 0.625rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      min-height: 1.25rem;
    }

    .research-status.error {
      color: #b54747;
    }

    .research-status.success {
      color: #3d6b4f;
    }

    .research-results {
      margin-bottom: 2rem;
    }

    .result-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1rem;
    }

    @media (max-width: 720px) {
      .result-columns {
        grid-template-columns: 1fr;
      }

      .research-form {
        flex-direction: column;
      }
    }

    .result-panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .result-panel-header {
      padding: 0.75rem 1rem;
      background: var(--accent-light);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
    }

    .result-panel-body {
      padding: 0.75rem 1rem;
      max-height: 480px;
      overflow-y: auto;
    }

    .result-item + .result-item {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .result-item h4 {
      font-size: 0.875rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .result-url {
      margin-top: 0.25rem;
      font-size: 0.75rem;
      word-break: break-all;
    }

    .result-url a {
      color: var(--accent);
    }

    .result-snippet {
      margin-top: 0.375rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .result-meta {
      margin-top: 0.25rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .result-empty,
    .result-error {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .result-error {
      color: #b54747;
    }

    .research-report {
      margin-bottom: 2rem;
    }

    .report-card {
      padding: 1.5rem;
    }

    .report-title {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .report-block {
      margin-bottom: 1.25rem;
    }

    .report-block:last-child {
      margin-bottom: 0;
    }

    .report-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .report-summary-text {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .report-body-text,
    .report-sources-text {
      font-size: 0.9375rem;
      color: var(--text-primary);
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .report-sources-text {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .report-error {
      padding: 1.5rem;
      color: #b54747;
      font-size: 0.9375rem;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-header {
      padding: 1rem 1.25rem;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .report-list {
      list-style: none;
      min-height: 120px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 0.75rem;
      opacity: 0.45;
    }

    .empty-state p {
      font-size: 0.9375rem;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>방산 리서치 아카이브</h1>
      <p>방위산업 관련 리서치 보고서를 모아둔 아카이브입니다.</p>
      <form id="research-form" class="research-form">
        <input
          id="topic-keyword"
          type="text"
          name="query"
          placeholder="관심 주제 키워드 (예: KF-21, 방산 수출)"
          autocomplete="off"
          maxlength="100"
        />
        <button type="submit" id="research-submit">리서치 실행</button>
      </form>
      <p id="research-status" class="research-status" aria-live="polite"></p>
    </header>

    <section id="research-results" class="research-results" hidden aria-labelledby="research-results-heading">
      <div class="section-header">
        <h2 id="research-results-heading">검색 결과</h2>
      </div>
      <div class="result-columns">
        <div class="result-panel">
          <div class="result-panel-header">글로벌 (Tavily)</div>
          <div id="tavily-results" class="result-panel-body"></div>
        </div>
        <div class="result-panel">
          <div class="result-panel-header">국내 (Naver)</div>
          <div id="naver-results" class="result-panel-body"></div>
        </div>
      </div>
    </section>

    <section id="research-report" class="research-report" hidden aria-labelledby="research-report-heading">
      <div class="section-header">
        <h2 id="research-report-heading">AI 보고서</h2>
      </div>
      <article class="report-card">
        <div id="report-content">
          <h3 id="report-title" class="report-title"></h3>
          <div class="report-block">
            <div class="report-label">요약</div>
            <div id="report-summary" class="report-summary-text"></div>
          </div>
          <div class="report-block">
            <div class="report-label">본문</div>
            <div id="report-body" class="report-body-text"></div>
          </div>
          <div class="report-block">
            <div class="report-label">출처</div>
            <div id="report-sources" class="report-sources-text"></div>
          </div>
        </div>
        <div id="report-error" class="report-error" hidden></div>
      </article>
    </section>

    <section aria-labelledby="report-list-heading">
      <div class="section-header">
        <h2 id="report-list-heading">보고서 목록</h2>
      </div>
      <ul class="report-list">
        <li class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
          <p>등록된 보고서가 없습니다.</p>
        </li>
      </ul>
    </section>

    <footer>
      &copy; 2026 방산 리서치 아카이브
    </footer>
  </div>
  <script src="js/research.js"></script>
</body>
</html>
