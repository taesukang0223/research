<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방산 리서치 아카이브</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --text-primary: #1a2332;
      --text-secondary: #5c6574;
      --text-muted: #8b939e;
      --border: #e2e5ea;
      --accent: #3d5a73;
      --accent-light: #eef2f6;
    }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.9375rem;
      color: var(--text-secondary);
    }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-header {
      padding: 1rem 1.25rem;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .report-list {
      list-style: none;
      min-height: 120px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 0.75rem;
      opacity: 0.45;
    }

    .empty-state p {
      font-size: 0.9375rem;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>방산 리서치 아카이브</h1>
      <p>방위산업 관련 리서치 보고서를 모아둔 아카이브입니다.</p>
    </header>

    <section aria-labelledby="report-list-heading">
      <div class="section-header">
        <h2 id="report-list-heading">보고서 목록</h2>
      </div>
      <ul class="report-list">
        <li class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
          <p>등록된 보고서가 없습니다.</p>
        </li>
      </ul>
    </section>

    <footer>
      &copy; 2026 방산 리서치 아카이브
    </footer>
  </div>
</body>
</html>
